upstream bristo_app {
    server app:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Increase body size limit to match the 10 mb Express limit (for image uploads)
    client_max_body_size 12m;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Static assets served from the public/ folder via the Node app ─────────
    # Cache aggressively for hashed assets; override per path if needed
    location ~* \.(ico|css|js|gif|jpg|jpeg|png|svg|woff2?|ttf|eot)$ {
        proxy_pass         http://bristo_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    # ── API routes ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://bristo_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts (generous for slow image uploads)
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ── Everything else → Node for SSR / SPA fallback ────────────────────────
    location / {
        proxy_pass         http://bristo_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
