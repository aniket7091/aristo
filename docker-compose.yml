services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: bristo-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: bristo-cafe
    volumes:
      - mongo_data:/data/db
    networks:
      - bristo-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Node / Express API ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bristo-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override the DB host so it resolves to the mongo service
      MONGODB_URI: mongodb://mongo:27017/bristo-cafe
      PORT: 5000
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - bristo-net
    # Not exposed to the host directly; traffic comes through nginx
    expose:
      - "5000"

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: bristo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - bristo-net

volumes:
  mongo_data:

networks:
  bristo-net:
    driver: bridge
