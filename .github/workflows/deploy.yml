# ============================================================================
# Bristo Café — CI/CD Pipeline
# ============================================================================
# Triggers:
#   • Push to main   → Lint + Build Docker image + Push to GHCR + Deploy to VPS
#   • Pull request   → Lint + Build (no push, no deploy)
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   MONGODB_URI           – Production MongoDB connection string
#   JWT_SECRET            – JWT signing secret
#   IMAGEKIT_PUBLIC_KEY   – ImageKit public key
#   IMAGEKIT_PRIVATE_KEY  – ImageKit private key
#   IMAGEKIT_URL_ENDPOINT – ImageKit URL endpoint
#   VPS_HOST              – Server IP or hostname
#   VPS_USERNAME          – SSH username (e.g. root or deploy)
#   VPS_SSH_KEY           – Private SSH key for the deploy user
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. aniketkumar/bristo

jobs:
  # ── 1. Lint & Sanity Check ─────────────────────────────────────────────────
  lint:
    name: Lint & Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --check server.js

  # ── 2. Build & Push Docker Image ───────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to VPS via SSH ───────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://${{ secrets.VPS_HOST }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # ── Navigate to project directory ──
            cd ~/bristo

            # ── Pull latest code ──
            git pull origin main

            # ── Create / update .env on server ──
            cat > .env <<'EOF'
            PORT=5000
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            IMAGEKIT_PUBLIC_KEY=${{ secrets.IMAGEKIT_PUBLIC_KEY }}
            IMAGEKIT_PRIVATE_KEY=${{ secrets.IMAGEKIT_PRIVATE_KEY }}
            IMAGEKIT_URL_ENDPOINT=${{ secrets.IMAGEKIT_URL_ENDPOINT }}
            NODE_ENV=production
            EOF

            # ── Pull the latest image from GHCR ──
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull app

            # ── Rebuild and restart containers (zero-downtime) ──
            docker compose up -d --build --remove-orphans

            # ── Clean up old images ──
            docker image prune -f

            echo "✅ Deployment complete!"
